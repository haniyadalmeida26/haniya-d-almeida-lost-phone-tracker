name: mobile
description: "Lost Phone Tracker App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  
  # Maps
  flutter_map: ^7.0.2
  google_maps_flutter: ^2.9.0
  latlong2: ^0.9.1
  
  # Location
  geolocator: ^12.0.0
  
  # Bluetooth
  flutter_blue_plus: ^1.31.0
  flutter_ble_peripheral: ^2.1.0
  permission_handler: ^11.3.1
  
  # Storage
  shared_preferences: ^2.3.0
  
  # Device Info
  device_info_plus: ^10.1.0
  
  # Alarm
  audioplayers: ^6.1.0
  
  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/lost_alarm.mpeg
